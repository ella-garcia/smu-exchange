<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
        }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-label {
            font-weight: 600;
            color: #555;
        }

        select {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .admin-toggle {
            background: #764ba2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-left: auto;
        }

        .admin-toggle:hover {
            background: #6a4291;
            transform: translateY(-2px);
        }

        .admin-toggle.active {
            background: #ff6b6b;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .tag {
            padding: 6px 15px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .tag:hover {
            background: #e0e0e0;
        }

        .tag.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .place-code {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
        }

        .place-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #222;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .area-name {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 12px;
        }

        .description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .categories {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .category-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #555;
        }

        .youtube-container {
            margin: 15px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .youtube-container iframe {
            width: 100%;
            aspect-ratio: 9/16;
            border: none;
            display: block;
        }

        .youtube-placeholder {
            background: #f8f8f8;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #999;
            margin: 15px 0;
        }

        .youtube-edit {
            margin: 15px 0;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 12px;
        }

        .youtube-edit label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .youtube-edit input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .youtube-edit input:focus {
            outline: none;
            border-color: #667eea;
        }

        .youtube-edit-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-save, .btn-remove {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-save {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-save:hover {
            background: #5568d3;
        }

        .btn-remove {
            background: #ff6b6b;
            color: white;
        }

        .btn-remove:hover {
            background: #ee5a5a;
        }

        .add-youtube-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .add-youtube-btn:hover {
            background: #5568d3;
        }

        .website-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
        }

        .website-link:hover {
            text-decoration: underline;
        }

        .new-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff6b6b;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            color: #888;
        }

        .no-results-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .clear-filters {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .clear-filters:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .export-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-left: 10px;
        }

        .export-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .youtube-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .stats {
                font-size: 0.9em;
            }
        }
    </style>
</head>

        let allPlaces = placesData;
        let filteredPlaces = [...allPlaces];
        let selectedCategories = new Set();
        let adminMode = false;

        // Load saved YouTube data from localStorage
        function loadYouTubeData() {
            const saved = localStorage.getItem('singaporePlacesYouTube');
            if (saved) {
                try {
                    const youtubeData = JSON.parse(saved);
                    allPlaces.forEach(place => {
                        if (youtubeData[place.Code]) {
                            place['YouTube Short'] = youtubeData[place.Code];
                        }
                    });
                } catch (e) {
                    console.error('Error loading YouTube data:', e);
                }
            }
        }

        // Save YouTube data to localStorage
        function saveYouTubeData() {
            const youtubeData = {};
            allPlaces.forEach(place => {
                if (place['YouTube Short']) {
                    youtubeData[place.Code] = place['YouTube Short'];
                }
            });
            localStorage.setItem('singaporePlacesYouTube', JSON.stringify(youtubeData));
        }

        // Extract YouTube video ID from URL or embed code
        function extractYouTubeID(input) {
            if (!input) return null;
            
            // Clean up the input
            input = input.trim();
            
            // Check if it's an embed code (contains iframe)
            if (input.includes('<iframe') || input.includes('iframe')) {
                const embedMatch = input.match(/src=["']([^"']+)["']/);
                if (embedMatch) {
                    input = embedMatch[1];
                }
            }
            
            // YouTube URL patterns
            const patterns = [
                /youtube\.com\/shorts\/([a-zA-Z0-9_-]+)/,
                /youtu\.be\/([a-zA-Z0-9_-]+)/,
                /youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/,
                /youtube\.com\/embed\/([a-zA-Z0-9_-]+)/,
                /v=([a-zA-Z0-9_-]+)/  // Catch any v= parameter
            ];
            
            for (const pattern of patterns) {
                const match = input.match(pattern);
                if (match && match[1]) return match[1];
            }
            
            // If it's just the ID (11 characters)
            if (/^[a-zA-Z0-9_-]{11}$/.test(input)) {
                return input;
            }
            
            return null;
        }

        // Update YouTube video for a place
        function updateYouTube(placeCode, url) {
            const place = allPlaces.find(p => p.Code === placeCode);
            if (place) {
                const videoId = extractYouTubeID(url);
                place['YouTube Short'] = videoId;
                saveYouTubeData();
                updateStats();
                renderPlaces();
            }
        }

        // Remove YouTube video
        function removeYouTube(placeCode) {
            const place = allPlaces.find(p => p.Code === placeCode);
            if (place) {
                place['YouTube Short'] = null;
                saveYouTubeData();
                updateStats();
                renderPlaces();
            }
        }

        // Update statistics
        function updateStats() {
            const videoCount = allPlaces.filter(p => p['YouTube Short']).length;
            document.getElementById('total-videos').textContent = videoCount;
        }

        // Extract unique areas and categories
        const areas = [...new Set(allPlaces.map(p => p['Area Name']))].sort();
        const allCategories = new Set();
        allPlaces.forEach(place => {
            if (place.Categories) {
                place.Categories.split(',').forEach(cat => {
                    allCategories.add(cat.trim());
                });
            }
        });
        const categories = [...allCategories].sort();

        // Count new places
        const newPlacesCount = allPlaces.filter(p => p['New?'] === 'NEW').length;
        document.getElementById('total-new').textContent = newPlacesCount;
        document.getElementById('total-areas').textContent = areas.length;

        // Load saved YouTube data
        loadYouTubeData();
        updateStats();

        // Populate area filter
        const areaFilter = document.getElementById('area-filter');
        areas.forEach(area => {
            const option = document.createElement('option');
            option.value = area;
            option.textContent = area;
            areaFilter.appendChild(option);
        });

        // Create category tags
        const categoryTagsContainer = document.getElementById('category-tags');
        categories.forEach(category => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.textContent = category;
            tag.onclick = () => toggleCategory(category);
            categoryTagsContainer.appendChild(tag);
        });

        function toggleCategory(category) {
            if (selectedCategories.has(category)) {
                selectedCategories.delete(category);
            } else {
                selectedCategories.add(category);
            }
            updateCategoryTags();
            filterPlaces();
        }

        function updateCategoryTags() {
            const tags = categoryTagsContainer.querySelectorAll('.tag');
            tags.forEach(tag => {
                if (selectedCategories.has(tag.textContent)) {
                    tag.classList.add('active');
                } else {
                    tag.classList.remove('active');
                }
            });
        }

        function filterPlaces() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const selectedArea = document.getElementById('area-filter').value;
            const newFilter = document.getElementById('new-filter').value;
            const videoFilter = document.getElementById('video-filter').value;

            filteredPlaces = allPlaces.filter(place => {
                const matchesSearch = !searchTerm || 
                    place['Place Name'].toLowerCase().includes(searchTerm) ||
                    (place.Description && place.Description.toLowerCase().includes(searchTerm)) ||
                    (place.Categories && place.Categories.toLowerCase().includes(searchTerm)) ||
                    (place['Area Name'] && place['Area Name'].toLowerCase().includes(searchTerm));

                const matchesArea = !selectedArea || place['Area Name'] === selectedArea;

                const matchesNew = !newFilter || 
                    (newFilter === 'new' && place['New?'] === 'NEW') ||
                    (newFilter === 'existing' && place['New?'] !== 'NEW');

                const matchesVideo = !videoFilter ||
                    (videoFilter === 'with-video' && place['YouTube Short']) ||
                    (videoFilter === 'no-video' && !place['YouTube Short']);

                const matchesCategory = selectedCategories.size === 0 || 
                    (place.Categories && [...selectedCategories].some(cat => 
                        place.Categories.split(',').map(c => c.trim()).includes(cat)
                    ));

                return matchesSearch && matchesArea && matchesNew && matchesVideo && matchesCategory;
            });

            renderPlaces();
        }

            if (adminMode) {

                if (place['YouTube Short']) {
                    return `

                            <label>YouTube Short URL, ID, or Embed Code:</label>

                                type="text"

                                value="${place['YouTube Short']}"

                                <button class="btn-save" onclick="saveYouTube('${place.Code}')">💾 Update</button>
                                <button class="btn-remove" onclick="removeYouTube('${place.Code}')">🗑️ Remove</button>
                            </div>
                        </div>
                    `;
                } else {
                    return `

                            <label>YouTube Short URL, ID, or Embed Code:</label>
                            <input 
                                type="text"

                                data-code="${place.Code}"
                                placeholder="Paste URL, embed code, or video ID"
                            >
                            <div class="youtube-hint">Accepts: URL, embed code (iframe), or just the video ID</div>
                            <div class="youtube-edit-buttons">
                                <button class="btn-save" onclick="saveYouTube('${place.Code}')">💾 Save Video</button>
                            </div>
                        </div>
                    `;
                }
            } else {
                // View mode
                if (place['YouTube Short']) {
                    return `
                        <div class="youtube-container">
                            <iframe 
                                src="https://www.youtube-nocookie.com/embed/${place['YouTube Short']}?rel=0&modestbranding=1&enablejsapi=1" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                referrerpolicy="strict-origin-when-cross-origin"
                                allowfullscreen
                                loading="lazy"
                            ></iframe>
                        </div>
                    `;
                }
                return '';
            }
        }

        function renderPlaces() {
            const grid = document.getElementById('places-grid');
            document.getElementById('showing-count').textContent = filteredPlaces.length;

            if (filteredPlaces.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <h2>No places found</h2>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredPlaces.map(place => {
                const categories = place.Categories ? 
                    place.Categories.split(',').map(c => c.trim()) : [];
                
                return `
                    <div class="card">
                        ${place['New?'] === 'NEW' ? '<div class="new-indicator">New</div>' : ''}
                        <div class="card-header">
                            <div class="place-code">${place.Code}</div>
                        </div>
                        <div class="place-name">${place['Place Name']}</div>
                        <div class="area-name">📍 ${place['Area Name']}</div>
                        ${place.Description ? `<div class="description">${place.Description}</div>` : ''}
                        ${categories.length > 0 ? `
                            <div class="categories">
                                ${categories.map(cat => `
                                    <span class="category-tag">${cat}</span>
                                `).join('')}
                            </div>
                        ` : ''}
                        ${renderYouTubeSection(place)}
                        ${place.Website ? `
                            <a href="${place.Website}" target="_blank" class="website-link">
                                🔗 Visit Website →
                            </a>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // Save YouTube URL from input
        window.saveYouTube = function(placeCode) {
            const input = document.querySelector(`.youtube-input[data-code="${placeCode}"]`);
            if (input && input.value.trim()) {
                updateYouTube(placeCode, input.value.trim());
            }
        };

        // Remove YouTube video
        window.removeYouTube = function(placeCode) {
            if (confirm('Remove this video?')) {
                removeYouTube(placeCode);
            }
        };

        // Toggle admin mode
        document.getElementById('admin-toggle').addEventListener('click', function() {
            adminMode = !adminMode;
            this.classList.toggle('active');
            this.textContent = adminMode ? '👁️ View Mode' : '🎬 Edit Mode';
            renderPlaces();
        });

        // Export data
        document.getElementById('export-btn').addEventListener('click', function() {
            const youtubeData = {};
            allPlaces.forEach(place => {
                if (place['YouTube Short']) {
                    youtubeData[place.Code] = {
                        name: place['Place Name'],
                        videoId: place['YouTube Short'],
                        url: `https://youtube.com/shorts/${place['YouTube Short']}`
                    };
                }
            });
            
            const dataStr = JSON.stringify(youtubeData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'singapore_places_youtube.json';
            link.click();
            URL.revokeObjectURL(url);
        });

        // Event listeners
        document.getElementById('search').addEventListener('input', filterPlaces);
        document.getElementById('area-filter').addEventListener('change', filterPlaces);
        document.getElementById('new-filter').addEventListener('change', filterPlaces);
        document.getElementById('video-filter').addEventListener('change', filterPlaces);
        document.getElementById('clear-filters').addEventListener('click', () => {
            document.getElementById('search').value = '';
            document.getElementById('area-filter').value = '';
            document.getElementById('new-filter').value = '';
            document.getElementById('video-filter').value = '';
            selectedCategories.clear();
            updateCategoryTags();
            filterPlaces();
        });

        // Initial render
        renderPlaces();
    </script>
</body>
</html>
